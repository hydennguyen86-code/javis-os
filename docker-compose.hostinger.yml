# ============================================================================
# Jarvis OS - HOSTINGER VPS (Docker Manager). Có LINK MẶC ĐỊNH + HTTPS như app Catalog (Hermes/n8n).
#
# Hostinger có sẵn: (1) wildcard DNS *.<hostname-vps>.hstgr.cloud trỏ về VPS, (2) reverse proxy Traefik
# tự cấp SSL. Bạn KHÔNG cần mua tên miền: đặt DOMAIN_NAME = <tên>.<hostname-vps>.hstgr.cloud là có link
# riêng chạy HTTPS ngay. Nhãn Traefik dưới đây COPY theo đúng mẫu app Hermes chạy tốt trên Hostinger
# (điểm mấu chốt: KHÔNG khai báo network - Traefik tự thấy container qua nhãn).
#
# CÁCH DÙNG:
#   1) Xem hostname VPS ở hPanel > VPS (vd: srv1782015.hstgr.cloud).
#   2) Docker Manager > Compose > URL > dán:
#      https://raw.githubusercontent.com/blogminhquy/jarvis-os/main/docker-compose.hostinger.yml
#   3) Ô Environment đặt (BẮT BUỘC):
#         DOMAIN_NAME=jarvis.<hostname-vps>.hstgr.cloud
#      Ví dụ:  DOMAIN_NAME=jarvis.srv1782015.hstgr.cloud
#      (Muốn dùng tên miền RIÊNG của bạn thì điền tên miền đó + trỏ DNS A về IP VPS trước.)
#   4) Deploy > đợi 1-3 phút cho Traefik cấp chứng chỉ > mở  https://<DOMAIN_NAME>.
#
# GHI CHÚ:
#   - Không đặt DOMAIN_NAME cũng deploy được, nhưng chỉ vào tạm bằng nút Open / :7777 (chưa có domain).
#   - Vẫn publish 7777 để có đường vào dự phòng khi cert chưa cấp xong.
#   - VPS KHÔNG phải Hostinger: bỏ file này, dùng docker-compose.yml + docker-compose.https.yml (Caddy).
#   - Image GHCR phải để PUBLIC (GitHub > Packages > jarvis-os > Package settings > Public).
# ============================================================================
services:
  jarvis:
    image: ghcr.io/blogminhquy/jarvis-os:latest
    container_name: jarvis
    restart: unless-stopped
    pull_policy: always
    environment:
      JARVIS_HOST: 0.0.0.0
      JARVIS_PORT: "7777"
      JARVIS_REQUIRE_LOGIN: "1"     # ÉP đăng nhập/đăng ký khi mở app (public)
      JARVIS_STATE_DIR: /data/state
      BRAIN_PATH: /data/brain
      BRAINS_DIR: /brains
      OBSIDIAN_VAULT_PATH: /data/vault
      CLAUDE_CWD: /app
    ports:
      - "7777:7777"                 # đường vào dự phòng (nút Open / http://<ip>:7777)
    labels:
      # Copy đúng mẫu Hermes: KHÔNG có traefik.docker.network, KHÔNG có networks external.
      - traefik.enable=true
      - traefik.http.routers.jarvis.rule=Host(`${DOMAIN_NAME:-jarvis.localhost}`)
      - traefik.http.routers.jarvis.entrypoints=websecure
      - traefik.http.routers.jarvis.tls.certresolver=letsencrypt
      - traefik.http.services.jarvis.loadbalancer.server.port=7777
    volumes:
      - jarvis-data:/data
      - jarvis-brains:/brains
      - claude-auth:/home/jarvis/.claude
      - codex-auth:/home/jarvis/.codex
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,os,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:'+os.getenv('JARVIS_PORT','7777')+'/health',timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

volumes:
  jarvis-data:
  jarvis-brains:
  claude-auth:
  codex-auth:
