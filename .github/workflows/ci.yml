name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cài dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile toàn bộ server + plugin
        run: python -m compileall -q server system/plugins

      - name: Chay test JS dashboard
        run: node dashboard/test_chat_ask.js

      - name: Chạy test (auth/secret/MCP-perm/traversal/CSRF + plugin)
        env:
          PYTHONIOENCODING: utf-8
        run: |
          cd server
          status=0
          for f in test_*.py; do
            echo "==== $f ===="
            python "$f" || status=1
          done
          exit $status
